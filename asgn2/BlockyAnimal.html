<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BlockyAnimal (1)</title>
  <style>
    canvas { float: left; margin-right: 20px; }
  </style>
</head>

<body onload="main()">
  <canvas id="BlockyAnimal" width="800" height="800">
    Please use a browser that supports "canvas"
  </canvas>

  <p id="numdot">XXX</p>

  <p>Red <input type="range" min="0" max="100" value="100" class="slider" id="redSlide"></p>

  <p>Magenta <input type="range" min="-45" max="45" value="0" class="slider" id="magentaSlide"></p>

  <p>Yellow <input type="range" min="-45" max="45" value="0" class="slider" id="yellowSlide">
    Animation:
    <button type="button" id="animationYellowOnButton">ON</button>
    <button type="button" id="animationYellowOffButton">OFF</button>
  </p>

  <p>Camera Angle <input type="range" min="0" max="90" value="5" class="slider" id="angleSlide"></p>

  <script src="lib/webgl-utils.js"></script>
  <script src="lib/webgl-debug.js"></script>
  <script src="lib/cuon-utils.js"></script>
  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="Cube.js"></script>
  <script src="Triangle.js"></script>
  <script src="BlockyAnimal.js"></script>
</body>
</html>
