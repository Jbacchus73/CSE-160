<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Assignment 0 (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>
    <br> 
    <label>v1: x </label>
    <input type="number" id="xinput1">
    &nbsp; <label>y </label>
    <input type="number" id="yinput1">
    <br> 
    <label>v2: x </label>
    <input type="number" id="xinput2">
    &nbsp; <label>y </label>
    <input type="number" id="yinput2">
    <br> 
    <input type="button" value ="Draw" onclick="handleDrawEvent()">
    <br><br>
    <label>Operation: </label>
    <select id = "operation" style="font-size: 12px;">
      <option value ="add">Addition</option>
      <option value ="sub">Subtraction</option>
      <option value ="mul">Multiplication</option>
      <option value ="div">Division</option>
      <option value ="angle">Angle Between</option>
      <option value ="area">Area</option>
      <option value ="magnitude">Magnitude</option>
      <option value ="normalize">Normalize</option>
    </select>
    &nbsp; <label>Scalar: </label>
    <input type="number" id="scalar">
    <br>
    <input type="button" value ="Draw" onclick="handleDrawOperationEvent()">
  </body>
</html>
